    <style>

<body>

    <!-- ===== PARTICLES ===== -->
    <canvas id="particle-canvas"></canvas>

    <div class="container">

        <div class="error-code">404</div>
        <div class="error-title">Page Not <span class="rose-gold-bg">Found</span></div>
        <div class="error-divider"></div>
        <p class="error-text">The page you are looking for does not exist, or has been moved. Please return to the homepage.</p>

        <a href="index.html" class="cta-button">Return Home</a>

        <div class="footer-note">
            <span class="signature">HALONEX · Private Collection</span>
        </div>

    </div>

    <!-- ============================================================
       JAVASCRIPT — Particles
    ============================================================ -->
    <script>
        (function() {

            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouseX = -1000;
            let mouseY = -1000;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2.8 + 0.6;
                    this.speedX = (Math.random() - 0.5) * 0.04;
                    this.speedY = (Math.random() - 0.5) * 0.04;
                    this.opacity = Math.random() * 0.2 + 0.06;
                    this.targetOpacity = this.opacity;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = 0.005 + Math.random() * 0.008;
                }

                update() {
                    this.wobble += this.wobbleSpeed;
                    this.x += this.speedX + Math.sin(this.wobble) * 0.1;
                    this.y += this.speedY + Math.cos(this.wobble * 0.7) * 0.1;

                    const dx = this.x - mouseX;
                    const dy = this.y - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 120) {
                        const force = (120 - dist) / 120;
                        this.x += (dx / dist) * force * 0.3;
                        this.y += (dy / dist) * force * 0.3;
                        this.targetOpacity = 0.45;
                    } else {
                        this.targetOpacity = Math.random() * 0.15 + 0.06;
                    }

                    if (this.x < -10) this.x = canvas.width + 10;
                    if (this.x > canvas.width + 10) this.x = -10;
                    if (this.y < -10) this.y = canvas.height + 10;
                    if (this.y > canvas.height + 10) this.y = -10;

                    this.opacity += (this.targetOpacity - this.opacity) * 0.01;
                }

                draw() {
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size * 4
                    );
                    gradient.addColorStop(0, `rgba(212, 168, 140, ${this.opacity * 0.7})`);
                    gradient.addColorStop(0.3, `rgba(212, 168, 140, ${this.opacity * 0.3})`);
                    gradient.addColorStop(0.7, `rgba(212, 168, 140, ${this.opacity * 0.08})`);
                    gradient.addColorStop(1, `rgba(212, 168, 140, 0)`);

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 0.7, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(212, 168, 140, ${this.opacity * 0.9})`;
                    ctx.fill();

                    if (this.size > 1.8) {
                        ctx.shadowColor = `rgba(212, 168, 140, ${this.opacity * 0.3})`;
                        ctx.shadowBlur = 20;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            const particleCount = Math.min(70, Math.floor(window.innerWidth / 10));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            }, { passive: true });

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });

                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 130) {
                            const opacity = (1 - dist / 130) * 0.035;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(212, 168, 140, ${opacity})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animateParticles);
            }
            animateParticles();

        })();
    </script>

</body>
